# Databricks Asset Bundle configuration for LLMOps Course
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation

bundle:
  name: course-code-hub

artifacts:
  default:
    type: whl
    build: uv build
    path: .

variables:
  git_sha:
    description: git_sha
    default: abcd
  branch:
    description: branch
    default: main
  schedule_pause_status:
    description: schedule pause status
    default: PAUSED
  warehouse_id:
    description: SQL warehouse ID for dashboards
    default: 1883724c3376103a

include:
  - resources/*.yml
  - resources/dashboard/*.yml

sync:
  include:
    - eval_inputs.txt
    - project_config.yml

targets:
  dev:
    default: true
    workspace:
      host: https://adb-971256932836835.15.azuredatabricks.net/
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.target}/${bundle.name}
      profile: dev
    variables:
      schedule_pause_status: PAUSED
  acc:
    mode: production
    workspace:
      host: https://adb-971256932836835.15.azuredatabricks.net
      root_path: /Shared/.bundle/${bundle.target}/${bundle.name}
    variables:
      schedule_pause_status: PAUSED

  prd:
    mode: production
    workspace:
      host: https://adb-971256932836835.15.azuredatabricks.net
      root_path: /Shared/.bundle/${bundle.target}/${bundle.name}
    variables:
      schedule_pause_status: UNPAUSED
