# Defines the structure of the bundle
# The minimum setup is the bundle and target definition.

bundle:
  name: llmops-databricks-course-diisnc

# jobs in resources folder
include:
  - resources/*.yml

variables:
  git_sha:
    description: "Git SHA of the deployed commit"
    default: "local"

# uv build command will be run when the databricks bundle is deployed
# path . defines the root of the project folder, where this file is located
# uv build will access the src folder (as defined in pyproject.toml) and take the package from
# there, building the whl (available in dist folder)
artifacts:
  default:
    type: whl
    build: uv build
    path: .

# the host should match the profile specified in the databricks extension
# the bundle will be store in the root_path
targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://dbc-e160dad8-9af8.cloud.databricks.com/
      root_path: /Workspace/Users/dianasofia.costa@sapo.pt/.bundle/${bundle.name}/${bundle.target}


