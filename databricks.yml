# Databricks Asset Bundle configuration for LLMOps Course
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation
# Defines the structure of the bundle
# The minimum setup is the bundle and target definition.

bundle:
  name: llmops-databricks-course-diisnc

# uv build command will be run when the databricks bundle is deployed (no need manually)
# path . defines the root of the project folder, where this file is located
# uv build will access the src folder (as defined in pyproject.toml) and take the package from
# there, building the whl (available in dist folder)
artifacts:
  default:
    type: whl
    build: uv build
    path: .

variables:
  git_sha:
    description: git_sha
    default: abcd
  branch:
    description: branch
    default: main
  schedule_pause_status:
    description: schedule pause status
    default: PAUSED

# jobs in resources folder
include:
  - resources/*.yml

sync:
  include:
    - eval_inputs.txt
    - project_config.yml

targets:
  dev:
    workspace:
      host: https://dbc-e160dad8-9af8.cloud.databricks.com/
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}

  acc:
    mode: production
    workspace:
      host: https://dbc-e160dad8-9af8.cloud.databricks.com/
      root_path: /Shared/.bundle/${bundle.target}/${bundle.name}
    variables:
      schedule_pause_status: PAUSED

  prd:
    mode: production
    workspace:
      host: https://dbc-e160dad8-9af8.cloud.databricks.com/
      root_path: /Shared/.bundle/${bundle.target}/${bundle.name}
    variables:
      schedule_pause_status: UNPAUSED
